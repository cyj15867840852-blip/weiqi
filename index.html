<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡通围棋 9x9 - AI 对战</title>
    <!-- 引入 TensorFlow.js 来加载你的模型 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        /* 卡通风格 CSS */
        body {
            background-color: #87CEEB; /* 天蓝色背景 */
            font-family: 'Comic Sans MS', '幼圆', sans-serif; /* 卡通字体 */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #FF6347;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1);
            font-size: 36px;
        }

        .game-container {
            background-color: #FFF8DC; /* 温暖的纸张色 */
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 4px solid #8B4513; /* 木头色粗边框 */
            text-align: center;
        }

        #board {
            background-color: #DEB887; /* 棋盘底色 */
            border: 4px solid #5C3A21;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            background-color: #FFD700;
            border: 3px solid #DAA520;
            border-radius: 15px;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            color: #8B4513;
            cursor: pointer;
            box-shadow: 0 5px 0px #DAA520;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #DAA520;
        }

        #status {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 15px;
            background: #fff;
            padding: 5px 15px;
            border-radius: 10px;
            border: 2px dashed #FF6347;
        }
    </style>
</head>
<body>

    <h1>🌟 欢乐围棋 9x9 🌟</h1>
    
    <div class="game-container">
        <!-- 9x9 棋盘，格子大小为40 -->
        <canvas id="board" width="400" height="400"></canvas>
        
        <div id="status">模型加载中... 请稍候</div>

        <div class="controls">
            <button onclick="passTurn()">停一手 (Pass)</button>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        
        const BOARD_SIZE = 9;
        const GRID_SIZE = 40;
        const MARGIN = 40; // 边缘留白
        
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0)); // 0空, 1黑, -1白
        let currentPlayer = 1; // 玩家执黑先手
        let model = null;
        let isGameReady = false;

        // 1. 初始化绘制棋盘
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 画网格
            ctx.strokeStyle = '#5C3A21';
            ctx.lineWidth = 2;
            for (let i = 0; i < BOARD_SIZE; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(MARGIN, MARGIN + i * GRID_SIZE);
                ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * GRID_SIZE, MARGIN + i * GRID_SIZE);
                ctx.stroke();
                // 竖线
                ctx.beginPath();
                ctx.moveTo(MARGIN + i * GRID_SIZE, MARGIN);
                ctx.lineTo(MARGIN + i * GRID_SIZE, MARGIN + (BOARD_SIZE - 1) * GRID_SIZE);
                ctx.stroke();
            }

            // 画星位 (9x9 棋盘通常有4个或5个星位)
            const starPoints = [[2, 2], [2, 6],[6, 2], [6, 6], [4, 4]];
            ctx.fillStyle = '#5C3A21';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(MARGIN + x * GRID_SIZE, MARGIN + y * GRID_SIZE, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // 画棋子
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        drawStone(i, j, board[i][j]);
                    }
                }
            }
        }

        function drawStone(x, y, color) {
            ctx.beginPath();
            ctx.arc(MARGIN + x * GRID_SIZE, MARGIN + y * GRID_SIZE, 18, 0, Math.PI * 2);
            // 卡通感渐变色棋子
            const gradient = ctx.createRadialGradient(
                MARGIN + x * GRID_SIZE - 5, MARGIN + y * GRID_SIZE - 5, 2,
                MARGIN + x * GRID_SIZE, MARGIN + y * GRID_SIZE, 18
            );
            if (color === 1) { // 黑子
                gradient.addColorStop(0, '#666');
                gradient.addColorStop(1, '#000');
            } else { // 白子
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ccc');
            }
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = color === 1 ? '#000' : '#888';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // 2. 玩家点击落子交互
        canvas.addEventListener('click', async (e) => {
            if (!isGameReady || currentPlayer !== 1) return; // 模型没加载完，或者没轮到玩家

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 转化为网格坐标
            const i = Math.round((x - MARGIN) / GRID_SIZE);
            const j = Math.round((y - MARGIN) / GRID_SIZE);

            if (i >= 0 && i < BOARD_SIZE && j >= 0 && j < BOARD_SIZE && board[i][j] === 0) {
                // TODO: 这里需要加入严格的围棋规则（提子、打劫检查）
                // 为了演示，目前仅允许在空地落子
                board[i][j] = 1; 
                drawBoard();
                currentPlayer = -1; // 切换给白棋 (AI)
                statusEl.innerText = "🤖 AI 思考中...";
                
                // 触发AI计算 (加入一点延迟让 UI 有时间刷新)
                setTimeout(triggerAiThink, 100);
            }
        });

        // 3. 加载 TensorFlow.js 模型
        async function loadAIModel() {
            try {
                // 注意：这里读取的是你截图中的 model.json。
                // 如果是 loadGraphModel 报错，请尝试换成 tf.loadLayersModel('./web_model/model.json')
                model = await tf.loadGraphModel('./web_model/model.json'); 
                isGameReady = true;
                statusEl.innerText = "✨ 游戏开始！轮到你了(黑棋) ✨";
                drawBoard();
            } catch (error) {
                console.error("模型加载失败: ", error);
                statusEl.innerText = "❌ 模型加载失败，请检查浏览器控制台";
            }
        }

        // 4. AI 思考逻辑 (核心功能)
        async function triggerAiThink() {
            if (!model) return;

            // 【重要说明】：不同的模型要求的输入形状 (Input Shape) 不同。
            // 大多数 9x9 模型接受[1, 9, 9, 1] 或平铺的 [1, 81] 张量。
            // 这里我们假设模型接受 1个批次，9x9维度，1个通道 (表示棋盘状态)。
            
            // 将棋盘转为一维数组特征 (根据你的模型可能需要修改)
            const inputData =[];
            for (let j = 0; j < BOARD_SIZE; j++) {
                for (let i = 0; i < BOARD_SIZE; i++) {
                    // 通常为了AI视角统一，把AI自己的子当成1，对手当成-1
                    inputData.push(board[i][j] === -1 ? 1 : (board[i][j] === 1 ? -1 : 0));
                }
            }

            // 转换成 Tensor (此处需根据你的模型实际 input shape 修改)
            // 如果你的模型报错 "expected input to have shape..."，请修改这里的形状
            const inputTensor = tf.tensor(inputData, [1, 9, 9, 1]); // 或 [1, 81]

            // 推理预测
            const result = model.predict(inputTensor);
            
            // 假设模型输出是一个包含 81 个落子概率的一维数组 (Policy)
            const policy = await result.data(); 

            // AI 寻找合法且胜率/概率最高的落子点
            let bestMove = -1;
            let maxProb = -Infinity;

            for (let k = 0; k < 81; k++) {
                let x = k % 9;
                let y = Math.floor(k / 9);
                
                // 必须是空地 (此处同样省略了复杂的禁入点和打劫判断)
                if (board[x][y] === 0) { 
                    if (policy[k] > maxProb) {
                        maxProb = policy[k];
                        bestMove = k;
                    }
                }
            }

            // 释放张量内存，防止浏览器崩溃
            inputTensor.dispose(); 
            if(result) result.dispose();

            if (bestMove !== -1) {
                let aiX = bestMove % 9;
                let aiY = Math.floor(bestMove / 9);
                board[aiX][aiY] = -1; // AI 落子
                statusEl.innerText = "✨ 轮到你了 (黑棋) ✨";
            } else {
                statusEl.innerText = "🤝 AI 选择 Pass";
            }

            currentPlayer = 1;
            drawBoard();
        }

        // 杂项控制功能
        function passTurn() {
            if (currentPlayer !== 1 || !isGameReady) return;
            currentPlayer = -1;
            statusEl.innerText = "🤖 AI 思考中...";
            setTimeout(triggerAiThink, 100);
        }

        function restartGame() {
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            currentPlayer = 1;
            statusEl.innerText = "✨ 游戏开始！轮到你了(黑棋) ✨";
            drawBoard();
        }

        // 页面加载完成后，开始加载模型
        window.onload = () => {
            drawBoard();
            loadAIModel();
        };
    </script>
</body>
</html>
