<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 萌萌小围棋 (AI觉醒版)</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
<style>
  /* 萌系 UI 保持不变 */
  body {
    display: flex; flex-direction: column; align-items: center;
    background: linear-gradient(135deg, #ffe0e9, #e0f2fe); 
    font-family: 'Comic Sans MS', 'Nunito', 'Microsoft YaHei', sans-serif;
    color: #5c4033; margin: 0; padding: 15px;
    min-height: 100vh; box-sizing: border-box; overflow-x: hidden; 
  }
  .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }
  h1 { margin: 0 0 15px 0; font-size: 24px; color: #ff758f; text-shadow: 2px 2px 0px #fff; letter-spacing: 2px;}
  .hud-panel { width: 100%; background: rgba(255, 255, 255, 0.85); border: 3px solid #ffb3c6; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(255, 117, 143, 0.15);}
  .hud-top { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #5c4033;}
  .hud-bottom { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
  .thread-status { color: #ff99ac; font-weight: bold; }
  .progress-bg { width: 100%; height: 10px; background: #ffeeee; border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid #ffb3c6;}
  .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff9a9e, #fecfef); transition: width 0.2s ease; border-radius: 10px;}
  canvas { width: 100%; aspect-ratio: 1 / 1; background-color: #f7d59b; border-radius: 12px; border: 6px solid #d4a373; box-shadow: 0 12px 25px rgba(139, 69, 19, 0.2); touch-action: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn-group { margin-top: 20px; display: flex; gap: 10px; justify-content: center; width: 100%; flex-wrap: wrap;}
  button { padding: 12px 15px; font-size: 14px; border: none; border-radius: 25px; background-color: #a2d2ff; color: #fff; cursor: pointer; font-weight: bold; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex: 1; box-shadow: 0 5px 0 #7ebae6; min-width: 120px;}
  button:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #7ebae6; }
  button:active { transform: translateY(2px); box-shadow: 0 3px 0 #7ebae6; }
  button.danger { background-color: #ffafcc; box-shadow: 0 5px 0 #f095b6; }
  button.danger:hover { box-shadow: 0 8px 0 #f095b6; }
  button.danger:active { box-shadow: 0 3px 0 #f095b6; }
  button.restart { background-color: #b9fbc0; box-shadow: 0 5px 0 #92e09b; color: #38b000; }
  button.restart:hover { box-shadow: 0 8px 0 #92e09b; }
  button.restart:active { box-shadow: 0 3px 0 #92e09b; }
</style>
</head>
<body>

<div class="container">
  <h1>🐾 萌萌哒小围棋 (AI觉醒版) 🐾</h1>
  
  <div class="hud-panel">
    <div class="hud-top">
      <div>🧑 玩家: <span id="player-score">0</span> 颗糖果</div>
      <div id="turn-indicator" style="color:#ff758f;">[ 正在叫醒 AI... ]</div>
      <div>🤖 萌萌AI: <span id="ai-score">0</span> 颗糖果</div>
    </div>
    <div class="hud-bottom">
      <span>玩家泡泡(气): <span id="player-liberties">0</span></span>
      <span class="thread-status" id="ai-status">加载聪明的大脑中...</span>
      <span>AI泡泡(气): <span id="ai-liberties">0</span></span>
    </div>
    <div class="progress-bg"><div class="progress-bar" id="calc-progress" style="width: 0%;"></div></div>
  </div>

  <canvas id="goBoard"></canvas>
  
  <div class="btn-group">
    <button onclick="passTurn()">🐾 休息一下 (Pass)</button>
    <button onclick="settleGame()" class="danger">🏁 算算谁赢啦</button>
    <button onclick="resetGame()" class="restart">🔄 重新开局</button>
  </div>
</div>

<script>
  const canvas = document.getElementById("goBoard");
  const ctx = canvas.getContext("2d");
  
  const size = 9; 
  const logicalSize = 800; 
  canvas.width = logicalSize; canvas.height = logicalSize;
  const padding = 50; const cellSize = (logicalSize - padding * 2) / (size - 1);
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  
  let board =[]; 
  let isPlayerTurn = false; 
  let isGameOver = false;
  let playerCaptures = 0, aiCaptures = 0; 
  let animState =[]; 
  let aiModel = null;
  let koPoint = null; // 打劫点保护
  let consecutivePasses = 0;

  async function initNeuralNetwork() {
    let bar = document.getElementById("calc-progress");
    let status = document.getElementById("ai-status");
    
    try { await tf.setBackend('webgl'); } catch (e) { console.warn("WebGL 不可用，使用默认后端"); }
    await tf.ready();
    
    status.innerText = "正在读取高级神经网络...";
    bar.style.width = "40%";

    try {
      aiModel = await tf.loadLayersModel('./web_model/model.json');
      status.innerText = "突触链接建立中...";
      bar.style.width = "80%";

      const inputShape = aiModel.inputs[0].shape.map(s => s === null ? 1 : s);
      const dummyInput = tf.zeros(inputShape);
      aiModel.predict(dummyInput).dispose();
      dummyInput.dispose();

      bar.style.width = "100%";
      setTimeout(() => {
          bar.style.width = "0%";
          status.innerText = "✨ AI 完全觉醒！ ✨";
          document.getElementById("turn-indicator").innerText = "[ 轮到玩家落子 ]";
          document.getElementById("turn-indicator").style.color = "#ff758f";
          isPlayerTurn = true;
      }, 500);

    } catch (error) {
      console.error(error);
      status.innerText = "网络加载失败啦！";
      status.style.color = "red";
    }
  }

  // 算法强化：获取棋子团与绝对气数
  function getGroup(b, r, c) {
    let color = b[r][c]; 
    if (color === 0) return { group: [], libs: 0, libPoints:[] };
    let visited = new Set(); 
    let group = []; 
    let libPoints = new Set();
    let queue =[{r, c}]; 
    visited.add(`${r},${c}`);
    
    while(queue.length > 0) {
      let curr = queue.pop(); 
      group.push(curr);
      for(let [dr, dc] of dirs) {
        let nr = curr.r + dr, nc = curr.c + dc;
        if(nr >= 0 && nr < size && nc >= 0 && nc < size) {
          let key = `${nr},${nc}`;
          if(b[nr][nc] === 0) { 
            libPoints.add(key); 
          } else if(b[nr][nc] === color && !visited.has(key)) { 
            visited.add(key); 
            queue.push({r: nr, c: nc}); 
          }
        }
      }
    } 
    return { group, libs: libPoints.size };
  }

  // 算法强化：合规移动与吃子判定(包含劫争拦截)
  function applyMove(b, r, c, player) {
    if (b[r][c] !== 0) return null;
    let nb = b.map(row => [...row]); 
    nb[r][c] = player;
    let enemy = player === 1 ? 2 : 1; 
    let capCount = 0;
    let capturedStones =[];
    
    // 1. 先判定吃子
    for(let [dr, dc] of dirs) {
      let nr = r + dr, nc = c + dc;
      if(nr >= 0 && nr < size && nc >= 0 && nc < size && nb[nr][nc] === enemy) {
        let g = getGroup(nb, nr, nc);
        if(g.libs === 0) { 
          g.group.forEach(s => { 
              if (nb[s.r][s.c] !== 0) { // 防止共用气的块被重复计算
                  nb[s.r][s.c] = 0; 
                  capCount++; 
                  capturedStones.push(s);
              }
          }); 
        }
      }
    }
    
    // 2. 判定是否为非法自杀
    let myG = getGroup(nb, r, c);
    if(myG.libs === 0) return null; 
    
    // 3. 记录打劫死锁点
    let kp = null;
    if (capCount === 1 && myG.group.length === 1 && myG.libs === 1) {
        kp = capturedStones[0];
    }
    
    return { board: nb, caps: capCount, koPoint: kp };
  }

  // 防瞎眼：避免 AI 在优势局末期填自己的真眼
  function isSimpleEye(b, r, c, player) {
      let myStones = 0;
      for(let [dr, dc] of dirs) {
          let nr = r + dr, nc = c + dc;
          if(nr < 0 || nr >= size || nc < 0 || nc >= size || b[nr][nc] === player) myStones++;
      }
      if (myStones !== 4) return false;
      
      let diagOpponents = 0;
      let diags = [[-1,-1], [-1,1], [1,-1], [1,1]];
      let onEdge = r===0 || r===size-1 || c===0 || c===size-1;
      for(let [dr, dc] of diags) {
          let nr = r + dr, nc = c + dc;
          if(nr >= 0 && nr < size && nc >= 0 && nc < size) {
              if(b[nr][nc] !== player && b[nr][nc] !== 0) diagOpponents++;
          }
      }
      if (onEdge && diagOpponents >= 1) return false;
      if (!onEdge && diagOpponents >= 2) return false;
      
      return true;
  }

  // 动态矩阵编码器：适应不同的模型通道维度 (1D, 2D 或者 SevenPlane)
  function encodeBoard(b, aiColor, koPoint) {
    let shape = aiModel.inputs[0].shape.map(s => s === null ? 1 : s);
    let isChannelsLast = shape.length === 4 ? (shape[3] !== 9 && shape[3] !== 19) : true; 
    let C = shape.length === 4 ? (isChannelsLast ? shape[3] : shape[1]) : 1;
    let flatBoard = new Float32Array(tf.util.sizeFromShape(shape)); // 默认为全0
    
    for(let r=0; r<size; r++) {
        for(let c=0; c<size; c++) {
            let color = b[r][c];
            if (color !== 0) {
                let libs = getGroup(b, r, c).libs;
                let p = -1;
                
                // SevenPlane 通道逻辑
                if (C >= 7) {
                    if (color === aiColor) p = libs === 1 ? 0 : (libs === 2 ? 1 : 2);
                    else p = libs === 1 ? 3 : (libs === 2 ? 4 : 5);
                }
                
                if (p !== -1) {
                    let idx = isChannelsLast ? (r * size * C + c * C + p) : (p * size * size + r * size + c);
                    flatBoard[idx] = 1;
                } else {
                    // 常规 CNN 降级逻辑
                    let idx = isChannelsLast ? (r * size * C + c * C + 0) : (0 * size * size + r * size + c);
                    flatBoard[idx] = (color === aiColor) ? 1 : -1;
                }
            }
            // 打劫层
            if (C >= 7 && koPoint && koPoint.r === r && koPoint.c === c) {
                let idx = isChannelsLast ? (r * size * C + c * C + 6) : (6 * size * size + r * size + c);
                flatBoard[idx] = 1;
            }
        }
    }
    return tf.tensor(flatBoard, shape);
  }

  // AI 思维中枢
  async function triggerAiThink() {
      if (isGameOver) return;
      document.getElementById("turn-indicator").innerText = "[ AI 正在运转战术核心... ]";
      document.getElementById("turn-indicator").style.color = "#a2d2ff";
      document.getElementById("calc-progress").style.width = "50%";

      await new Promise(r => setTimeout(r, 80)); 

      let validMoves =[];
      let passProb = 0;

      try {
          tf.tidy(() => {
              const inputTensor = encodeBoard(board, 2, koPoint);
              const output = aiModel.predict(inputTensor);
              // 解析网络原始输出(Policy) 此时不加任何人为干扰，彻底释放网络实力
              const data = Array.isArray(output) ? output[0].dataSync() : output.dataSync(); 
              
              for(let r=0; r<size; r++) {
                  for(let c=0; c<size; c++) {
                      if(board[r][c] !== 0) continue;
                      if(koPoint && koPoint.r === r && koPoint.c === c) continue; // 拦截打劫位
                      
                      let res = applyMove(board, r, c, 2);
                      if(res) {
                          // 只有在没吃子的情况下，阻止 AI 瞎填自己的眼
                          if(isSimpleEye(board, r, c, 2) && res.caps === 0) continue;
                          
                          let prob = data[r * size + c] || 0;
                          validMoves.push({r, c, res, prob});
                      }
                  }
              }
              if (data.length > 81) passProb = data[81];
          });
      } catch(e) { console.error("网络读取异常", e); }

      // 遵循模型本身最高置信度
      validMoves.sort((a,b) => b.prob - a.prob);
      let bestMove = validMoves[0]; 

      // 决定：落子 or Pass
      if (bestMove && (passProb <= bestMove.prob)) {
          board = bestMove.res.board; 
          aiCaptures += bestMove.res.caps;
          koPoint = bestMove.res.koPoint;
          animState[bestMove.r][bestMove.c].scale = 0.1; 
          animState[bestMove.r][bestMove.c].velocity = 0.2; 
          consecutivePasses = 0;
      } else {
          document.getElementById("turn-indicator").innerText = "[ AI 觉得现在不该走 (Pass) ]";
          koPoint = null;
          consecutivePasses++;
          await new Promise(r => setTimeout(r, 1000));
          if(consecutivePasses >= 2) {
              settleGame();
              document.getElementById("calc-progress").style.width = "0%";
              return;
          }
      }

      document.getElementById("calc-progress").style.width = "100%";
      setTimeout(() => {
          document.getElementById("calc-progress").style.width = "0%";
          if(!isGameOver) {
              document.getElementById("turn-indicator").innerText = "[ 轮到玩家落子 ]";
              document.getElementById("turn-indicator").style.color = "#ff758f";
              isPlayerTurn = true; 
          }
          updateUI();
      }, 100);
  }

  // 领地（点目）结算引擎，正规化判断实力
  function evaluateTerritory() {
      let bArea = 0, wArea = 0;
      let bStones = 0, wStones = 0;
      let visited = new Set();
      
      for(let r=0; r<size; r++) {
          for(let c=0; c<size; c++) {
              if(board[r][c] === 1) bStones++;
              if(board[r][c] === 2) wStones++;
              
              if(board[r][c] === 0 && !visited.has(`${r},${c}`)) {
                  let queue = [{r, c}];
                  let group =[];
                  let touchesBlack = false;
                  let touchesWhite = false;
                  visited.add(`${r},${c}`);
                  
                  while(queue.length > 0) {
                      let curr = queue.pop();
                      group.push(curr);
                      for(let [dr, dc] of dirs) {
                          let nr = curr.r + dr, nc = curr.c + dc;
                          if(nr >= 0 && nr < size && nc >= 0 && nc < size) {
                              if(board[nr][nc] === 1) touchesBlack = true;
                              else if(board[nr][nc] === 2) touchesWhite = true;
                              else if(!visited.has(`${nr},${nc}`)) {
                                  visited.add(`${nr},${nc}`);
                                  queue.push({r: nr, c: nc});
                              }
                          }
                      }
                  }
                  if(touchesBlack && !touchesWhite) bArea += group.length;
                  if(touchesWhite && !touchesBlack) wArea += group.length;
              }
          }
      }
      return { black: bStones + bArea, white: wStones + wArea };
  }

  // ==== 原视觉动画与交互层全数保留 ====

  function initBoard() {
    board = Array(size).fill(0).map(() => Array(size).fill(0));
    animState = Array(size).fill(0).map(() => Array(size).fill(0).map(() => ({
      scale: 0, velocity: 0, target: 0, wobble: Math.random() * Math.PI * 2 
    })));
    playerCaptures = 0; aiCaptures = 0; isGameOver = false; koPoint = null; consecutivePasses = 0;
    updateUI();
  }

  function animate() { updatePhysics(); draw(); requestAnimationFrame(animate); }
  function updatePhysics() {
    for (let r = 0; r < size; r++) { for (let c = 0; c < size; c++) {
        let cell = animState[r][c]; let baseTarget = (board[r][c] !== 0) ? 1 : 0;
        if (baseTarget === 1) { cell.wobble += 0.05; baseTarget += Math.sin(cell.wobble) * 0.02; }
        let force = (baseTarget - cell.scale) * 0.15;
        cell.velocity += force; cell.velocity *= 0.75; cell.scale += cell.velocity;
        if (Math.abs(cell.velocity) < 0.001 && Math.abs(cell.scale - baseTarget) < 0.001) cell.scale = baseTarget;
    }}
  }
  
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#c08c60"; ctx.lineWidth = 3; ctx.lineCap = "round";
    for (let i=0; i<size; i++) {
      const p = padding + i*cellSize;
      ctx.beginPath(); ctx.moveTo(p, padding); ctx.lineTo(p, canvas.height-padding); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(padding, p); ctx.lineTo(canvas.width-padding, p); ctx.stroke();
    }
    ctx.fillStyle = "#8b5e3c";
    [[2,2],[2,6],[6,2],[6,6],[4,4]].forEach(([r,c]) => { ctx.beginPath(); ctx.arc(padding+c*cellSize, padding+r*cellSize, 6, 0, Math.PI*2); ctx.fill(); });
    
    let libertyMap = new Map();
    for(let r=0; r<size; r++) for(let c=0; c<size; c++) if(board[r][c]!==0) libertyMap.set(`${r},${c}`, getGroup(board, r, c).libs);
    
    drawLinkLayer(1, "outline"); drawLinkLayer(2, "outline");
    drawLinkLayer(1, "body", libertyMap); drawLinkLayer(2, "body", libertyMap);
  }

  function drawLinkLayer(color, layerType, libertyMap) {
    const isBlack = (color === 1);
    const bodyColor = isBlack ? "#333344" : "#fff8f0"; 
    const outlineColor = isBlack ? "#1a1a2e" : "#d1d1d1"; 
    const baseStoneRadius = cellSize * 0.45; const baseBridgeWidth = cellSize * 0.2; const outlineThickness = 6; 
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = (layerType === "outline") ? outlineColor : bodyColor;
    
    for (let r = 0; r < size; r++) { for (let c = 0; c < size; c++) {
      if (board[r][c] !== color) continue;
      let s1 = animState[r][c].scale; if (s1 < 0.1) continue;
      if (c + 1 < size && board[r][c+1] === color) drawBond(r, c, r, c+1, s1, animState[r][c+1].scale, layerType, baseBridgeWidth, outlineThickness);
      if (r + 1 < size && board[r+1][c] === color) drawBond(r, c, r+1, c, s1, animState[r+1][c].scale, layerType, baseBridgeWidth, outlineThickness);
    }}
    for (let r = 0; r < size; r++) { for (let c = 0; c < size; c++) {
      if (board[r][c] !== color) continue;
      let s = animState[r][c].scale; if (s < 0.1) continue;
      const x = padding + c * cellSize; const y = padding + r * cellSize; const currentRadius = baseStoneRadius * s;
      
      if (layerType === "outline") { 
          ctx.fillStyle = outlineColor; ctx.beginPath(); ctx.arc(x, y, currentRadius + outlineThickness/2, 0, Math.PI*2); ctx.fill(); 
      } else { 
          ctx.fillStyle = bodyColor; ctx.beginPath(); ctx.arc(x, y, currentRadius, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,0.6)"; 
          ctx.beginPath(); ctx.ellipse(x - currentRadius*0.3, y - currentRadius*0.3, currentRadius*0.3, currentRadius*0.15, Math.PI/4, 0, Math.PI*2); ctx.fill();
          let libs = libertyMap ? libertyMap.get(`${r},${c}`) : 4; 
          drawFace(x, y, s, isBlack, libs); 
      }
    }}
  }

  function drawBond(r1, c1, r2, c2, s1, s2, layerType, baseWidth, thickness) {
    if (s2 < 0.1) return;
    const x1 = padding + c1 * cellSize; const y1 = padding + r1 * cellSize;
    const x2 = padding + c2 * cellSize; const y2 = padding + r2 * cellSize;
    let width = baseWidth * (s1 + s2) / 2; ctx.lineWidth = (layerType === "outline") ? width + thickness : width;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  function drawFace(x, y, scale, isBlack, libs) {
    if (scale < 0.6) return; 
    const faceColor = isBlack ? "#888" : "#666"; 
    ctx.fillStyle = faceColor; ctx.strokeStyle = faceColor;
    ctx.lineWidth = 2.5 * scale; ctx.lineCap = "round";
    let shakeX = 0, shakeY = 0;
    if (libs === 1) { shakeX = (Math.random()-0.5)*5; shakeY = (Math.random()-0.5)*5; }
    const cx = x + shakeX; const cy = y + shakeY; const eyeOffset = 10 * scale;
    if (libs === 1) { 
      ctx.beginPath(); ctx.moveTo(cx-eyeOffset-4, cy-4); ctx.lineTo(cx-eyeOffset, cy+2); ctx.lineTo(cx-eyeOffset-4, cy+8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+eyeOffset+4, cy-4); ctx.lineTo(cx+eyeOffset, cy+2); ctx.lineTo(cx+eyeOffset+4, cy+8); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy+12*scale, 4*scale, 0, Math.PI*2); ctx.stroke();
    } else { 
      ctx.beginPath(); ctx.arc(cx - eyeOffset, cy - 2, 3*scale, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeOffset, cy - 2, 3*scale, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy+3, 8*scale, 0.2, Math.PI-0.2); ctx.stroke();
    }
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (!isPlayerTurn || isGameOver) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const c = Math.floor((x - padding + cellSize/2) / cellSize);
    const r = Math.floor((y - padding + cellSize/2) / cellSize);

    if (r>=0 && r<size && c>=0 && c<size && board[r][c]===0) {
      if (koPoint && koPoint.r === r && koPoint.c === c) return; // 玩家不能走打劫被禁用的点位
      
      let res = applyMove(board, r, c, 1);
      if(res) {
        board = res.board; playerCaptures += res.caps; koPoint = res.koPoint;
        animState[r][c].scale = 0.1; animState[r][c].velocity = 0.2; 
        isPlayerTurn = false; consecutivePasses = 0; updateUI();
        triggerAiThink();
      }
    }
  });

  // UI 上的欢乐泡泡气数计算器 (只做展示用)
  function calculateTotalLiberties() {
    let blackLibs=0, whiteLibs=0;
    for(let r=0;r<size;r++) {
      for(let c=0;c<size;c++) {
        if(board[r][c]===0) {
          let pb=false, pw=false;
          dirs.forEach(([dr,dc])=>{
            let nr=r+dr, nc=c+dc; 
            if(nr>=0 && nr<size && nc>=0 && nc<size){
               if(board[nr][nc]===1) pb=true; 
               if(board[nr][nc]===2) pw=true;
            }
          });
          if(pb) blackLibs++; if(pw) whiteLibs++;
        }
      }
    } 
    return { blackLibs, whiteLibs };
  }

  function passTurn() { 
    if(isPlayerTurn && !isGameOver) { 
        isPlayerTurn=false; koPoint = null; consecutivePasses++; 
        if(consecutivePasses >= 2) settleGame(); else triggerAiThink(); 
    } 
  }

  function settleGame() { 
    if(isGameOver) return; 
    let area = evaluateTerritory(); // 使用正规的中国流点目算法判断模型最终实力
    let komi = 6.5; // 标准让子目数
    let totalWhite = area.white + komi;
    let msg = area.black > totalWhite ? "哇哦！你居然赢了萌萌 AI！🎉" : "呀，AI 凭借聪明的脑袋赢啦！🤖";
    alert(`🎀 游戏结束啦 🎀\n\n🧑 你的实地: ${area.black} 目\n🤖 AI的实地: ${totalWhite} 目 (含6.5补偿)\n\n${msg}`); 
    isGameOver=true; 
  }

  function resetGame() { initBoard(); }
  
  function updateUI() {
    document.getElementById("player-score").innerText = playerCaptures; 
    document.getElementById("ai-score").innerText = aiCaptures;
    let l = calculateTotalLiberties();
    document.getElementById("player-liberties").innerText = l.blackLibs; 
    document.getElementById("ai-liberties").innerText = l.whiteLibs;
  }

  initBoard(); 
  animate(); 
  initNeuralNetwork(); 
</script>
</body>
</html>
